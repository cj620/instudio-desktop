name: Deploy Website (Netlify)

# 构建 website/(Vite + React)并部署到 Netlify。
# 仅当 website/ 或本工作流变动时触发,避免每次 app 提交都重新部署官网。
on:
  push:
    branches: [master]
    paths:
      - 'website/**'
      - '.github/workflows/netlify.yml'
  # 新版本发布后重建,让站点的 release.json 跟到最新下载链接。
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

# 同一时间只跑一个部署;新推送取消进行中的旧部署。
concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Netlify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build
        run: npm run build
        working-directory: website
        env:
          # prebuild 的 fetch-release.mjs 用它抓最新 Release(高限额、稳定)
          GITHUB_TOKEN: ${{ github.token }}
          # Netlify 在根路径托管,base 必须是 '/'(GitHub 运行器不会自动注入 NETLIFY)
          DEPLOY_BASE: '/'

      - name: Deploy to Netlify
        run: npx --yes netlify-cli@17 deploy --dir=dist --prod --message "CI deploy ${{ github.sha }}"
        working-directory: website
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
