name: Release

# 推送形如 v0.1.0 的版本 tag 即触发:并行构建 macOS + Windows 安装包,
# 然后把产物(含 electron-updater 用的 latest*.yml)发布到本仓库的 GitHub Release。
# 不做代码签名 / 公证;mac 未签名时客户端自动更新会降级为「打开下载页」。
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '已存在的 tag(重新构建用),例如 v0.1.0'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  build-macos:
    name: Build macOS (unsigned)
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      # 不做签名:跳过 keychain 身份自动发现,避免误用 runner 上的证书
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check Extension public release gate
        run: npm run check:extension-release-gate

      - name: Build unsigned macOS packages (dmg + zip, arm64 + x64)
        run: npm run dist:mac

      - name: Smoke packaged Extension Node runtime (macOS x64)
        run: npm run smoke:packaged-extensions -- --resources dist/mac/小元.app/Contents/Resources

      - name: Smoke packaged Extension Node runtime (macOS arm64)
        run: npm run smoke:packaged-extensions -- --resources dist/mac-arm64/小元.app/Contents/Resources

      - name: Smoke packaged Extension desktop Chromium (host-native macOS)
        run: npm run smoke:packaged-extension-desktop -- --resources dist/mac-arm64/小元.app/Contents/Resources

      - name: Record commit-bound macOS artifact evidence
        run: npm run evidence:extension-native

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          if-no-files-found: error
          retention-days: 5
          path: |
            dist/Xiaoyuan-*-mac-*.dmg
            dist/Xiaoyuan-*-mac-*.zip
            dist/Xiaoyuan-*-mac-*.blockmap
            dist/latest-mac.yml
            dist/extension-native-evidence-darwin.json

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check Extension public release gate
        run: npm run check:extension-release-gate

      - name: Build Windows installer (NSIS x64)
        run: npm run dist:win

      - name: Smoke packaged Extension Node runtime
        run: npm run smoke:packaged-extensions -- --resources dist/win-unpacked/resources

      - name: Smoke packaged Extension desktop Chromium
        run: npm run smoke:packaged-extension-desktop

      - name: Record commit-bound Windows artifact evidence
        run: npm run evidence:extension-native

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          if-no-files-found: error
          retention-days: 5
          path: |
            dist/Xiaoyuan-*-win-x64.exe
            dist/Xiaoyuan-*-win-x64.exe.blockmap
            dist/latest.yml
            dist/extension-native-evidence-win32.json

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify required artifacts
        run: |
          set -euo pipefail
          required=(
            "Xiaoyuan-*-mac-arm64.dmg"
            "Xiaoyuan-*-mac-x64.dmg"
            "Xiaoyuan-*-mac-arm64.zip"
            "Xiaoyuan-*-mac-x64.zip"
            "Xiaoyuan-*-win-x64.exe"
            "latest-mac.yml"
            "latest.yml"
            "extension-native-evidence-darwin.json"
            "extension-native-evidence-win32.json"
          )
          for pattern in "${required[@]}"; do
            if ! compgen -G "release-artifacts/${pattern}" > /dev/null; then
              echo "::error::Missing release artifact matching ${pattern}"
              find release-artifacts -maxdepth 2 -type f | sort
              exit 1
            fi
          done
          find release-artifacts -maxdepth 2 -type f | sort

      - name: Create or update GitHub Release
        run: |
          set -euo pipefail
          # 带连字符的 tag(如 v0.2.0-beta.1)按预发布处理,对应客户端 frontier 通道
          extra=(--latest)
          if [[ "${TAG_NAME}" == *-* ]]; then
            extra=(--prerelease)
          fi
          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --draft=false "${extra[@]}"
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --generate-notes \
              --verify-tag \
              "${extra[@]}"
          fi

      - name: Upload release assets
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(
            find release-artifacts -type f \
              \( -name 'Xiaoyuan-*' -o -name 'latest*.yml' \) -print0
          )
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No release assets found"
            exit 1
          fi
          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
